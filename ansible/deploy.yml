---
- name: Déploiement de l'API FastAPI
  hosts: local
  become: false

  vars:
    app_dir: "/var/jenkins_home/workspace/mon-projet-devsecops"
    compose_cmd: "/usr/local/lib/docker/cli-plugins/docker-compose"

  tasks:
    - name: Arrêter l'ancienne version
      shell: "{{ compose_cmd }} down || true"
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: true

    - name: Lancer la nouvelle version
      shell: "{{ compose_cmd }} up -d"
      args:
        chdir: "{{ app_dir }}"

    - name: Attendre 10 secondes
      pause:
        seconds: 10

    - name: Récupérer l'IP du conteneur mon-api
      shell: docker inspect -f '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}{% endraw %}' mon-api
      register: api_ip

    - name: Vérifier que l'API répond via curl
      shell: "curl -sf http://{{ api_ip.stdout }}:8000/health"
      register: result
      retries: 5
      delay: 5
      until: result.rc == 0

    - name: Afficher le statut final
      debug:
        msg: "Pipeline complet — API déployée : {{ result.stdout }}"
