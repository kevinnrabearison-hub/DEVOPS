- name: Déploiement de l'API FastAPI
  hosts: local
  become: false

  vars:
    app_dir: "/var/jenkins_home/workspace/mon-projet-devsecops"
    compose_cmd: "/usr/local/lib/docker/cli-plugins/docker-compose"
    image_full: "localhost:8081/projet/mon-api:{{ image_tag }}"

  tasks:

    - name: Pull de l'image depuis Harbor
      shell: docker pull {{ image_full }}

    - name: Stop ancien conteneur
      shell: "{{ compose_cmd }} down || true"
      args:
        chdir: "{{ app_dir }}"

    - name: Injecter image dans docker-compose
      shell: |
        sed -i 's|image: .*|image: {{ image_full }}|' docker-compose.yml
      args:
        chdir: "{{ app_dir }}"

    - name: Lancer nouvelle version
      shell: "{{ compose_cmd }} up -d"
      args:
        chdir: "{{ app_dir }}"

    - name: Attendre que le port 8000 soit ouvert
      wait_for:
        host: "localhost"
        port: 8000
        delay: 5
        timeout: 60

    - name: Vérifier health endpoint
      uri:
        url: "http://localhost:8000/health"
        status_code: 200
      register: result
      retries: 10
      delay: 5
      until: result.status == 200

    - name: Afficher résultat
      debug:
        msg: "API OK : {{ result.json }}"