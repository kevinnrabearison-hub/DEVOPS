---
- name: Déploiement de l'API FastAPI
  hosts: local
  become: false

  vars:
    app_dir: "/var/jenkins_home/workspace/mon-projet-devsecops"
    compose_cmd: "/usr/local/lib/docker/cli-plugins/docker-compose"

  tasks:
    - name: Arrêter l'ancienne version
      shell: "{{ compose_cmd }} down || true"
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: true

    - name: Lancer la nouvelle version
      shell: "{{ compose_cmd }} up -d"
      args:
        chdir: "{{ app_dir }}"

    - name: Attendre que l'API démarre
      wait_for:
        host: localhost
        port: 8000
        delay: 10
        timeout: 120

    - name: Vérifier que l'API répond
      uri:
        url: "http://localhost:8000/health"
        return_content: yes
      register: result

    - name: Afficher le statut
      debug:
        msg: "API déployée avec succès : {{ result.content }}"
