services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mon-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
